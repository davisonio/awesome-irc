name: CI
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
jobs:
  awesome_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - run: npx awesome-lint readme.md
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.7
      - run: gem install awesome_bot
      # White list:
      #   awesome.re - always 301 redirects to github
      #   davison.io - SSL hostname mismatch on cert
      #   quassel-irc.org - intermittently unreachable
      - run: awesome_bot readme.md --white-list awesome.re,davison.io,quassel-irc.org
